name: Bun CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bun-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install --frozen-lockfile || bun install
      # Try frozen-lockfile first if one exists, otherwise fallback to normal install.
      # Since bun.lock is gitignored, it will likely fallback, which is fine for compatibility check.

    - name: Run native Bun tests
      run: bun run test:bun

    - name: Run Jest tests with Bun
      run: bun run test:jest:bun

    - name: Build CLI
      run: bun run build

    - name: Build Web
      run: bun run build:web
